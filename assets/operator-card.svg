<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Julio C Operator Card</title>
  <desc id="desc">A dark terminal-style GitHub profile banner showing Julio C as a founder and security-minded builder.</desc>
  <rect width="1280" height="420" rx="0" fill="#070807"/>
  <path d="M0 0H1280V420H0V0Z" fill="url(#grid)"/>
  <rect x="42" y="38" width="1196" height="344" rx="18" fill="#0B0D0B" stroke="#263326" stroke-width="2"/>
  <rect x="70" y="66" width="1140" height="288" rx="12" fill="#10130F" stroke="#1D291D"/>
  <path d="M70 116H1210" stroke="#1C261C"/>
  <circle cx="96" cy="91" r="7" fill="#B6F36A"/>
  <circle cx="120" cy="91" r="7" fill="#B9904A"/>
  <circle cx="144" cy="91" r="7" fill="#475847"/>
  <text x="182" y="96" fill="#8EA38E" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">~/julio-c/public-reputation</text>
  <text x="96" y="164" fill="#E8F5E8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="58" font-weight="700">JULIO C</text>
  <text x="100" y="205" fill="#B6F36A" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24">FOUNDER / SECURITY-MINDED BUILDER</text>
  <text x="100" y="252" fill="#C9D6C9" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="28">reproduce issue -> cut noise -> ship fix -> leave proof</text>
  <text x="100" y="313" fill="#F0F7F0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30">COMMITS ARE ACTIVITY. MERGES ARE RESPECT.</text>
  <g transform="translate(820 146)">
    <rect x="0" y="0" width="310" height="144" rx="10" fill="#070807" stroke="#2A3D2A"/>
    <text x="24" y="42" fill="#8EA38E" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">CURRENT QUEST</text>
    <text x="24" y="80" fill="#E8F5E8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">turn public work</text>
    <text x="24" y="111" fill="#E8F5E8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">into credibility</text>
  </g>
  <path d="M100 337H680" stroke="#B6F36A" stroke-width="2"/>
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#102010" stroke-opacity="0.55" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
