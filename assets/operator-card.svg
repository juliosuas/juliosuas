<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Julio Suastegui GitHub profile terminal</title>
  <desc id="desc">A hacker terminal profile with ASCII panels for Asuka, Akari and Madoka presenting the juliosuas GitHub profile.</desc>
  <rect width="1280" height="820" fill="#08090d"/>
  <rect width="1280" height="820" fill="url(#grid)" opacity="0.9"/>
  <rect x="24" y="24" width="1232" height="772" rx="8" fill="#0b0d12" stroke="#2a3342" stroke-width="2"/>
  <rect x="24" y="24" width="1232" height="44" rx="8" fill="#151821"/>
  <circle cx="52" cy="46" r="7" fill="#ff4b55"/>
  <circle cx="76" cy="46" r="7" fill="#ffd166"/>
  <circle cx="100" cy="46" r="7" fill="#62ff9e"/>
  <text x="126" y="52" fill="#cbd2df" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">juliosuas@github:~/public_profile - wired terminal</text>

  <text x="58" y="108" fill="#7cff9b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">&gt; ./summon-profile --handle juliosuas --mode 4chan-hacker --receipts public</text>
  <text x="58" y="144" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">&gt; loading waifu_ascii: asuka.sys akari.log madoka.exe</text>
  <text x="58" y="180" fill="#ff6b6b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">&gt; warning: flex must be backed by commits, PRs, and shipped repos</text>

  <g transform="translate(58 226)">
    <rect width="372" height="260" fill="#11131a" stroke="#ff4b55" stroke-width="2"/>
    <text x="24" y="42" fill="#ff6b6b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="700">ASUKA.SYS</text>
    <text x="24" y="82" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">   /\_/\      PILOT: JULIO</text>
    <text x="24" y="112" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">  ( o_o )     HANDLE: juliosuas</text>
    <text x="24" y="142" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">  /| R |\     MODE: commit assault</text>
    <text x="24" y="172" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19"> /_|___|_\    RULE: ship/log</text>
    <text x="24" y="218" fill="#ffb3b3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">redline: upstream PRs + ops</text>
  </g>

  <g transform="translate(464 226)">
    <rect width="372" height="260" fill="#11131a" stroke="#5cc8ff" stroke-width="2"/>
    <text x="24" y="42" fill="#75d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="700">AKARI.LOG</text>
    <text x="24" y="82" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">   .-"""-.    PROFILE: online</text>
    <text x="24" y="112" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">  /  o o  \   SIGNAL: public graph</text>
    <text x="24" y="142" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19"> |    ^    |  CHAOS: friendly</text>
    <text x="24" y="172" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">  \  ---  /   PROOF: repos + merges</text>
    <text x="24" y="218" fill="#b8ecff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">soft chaos, hard receipts</text>
  </g>

  <g transform="translate(870 226)">
    <rect width="372" height="260" fill="#11131a" stroke="#ff77c8" stroke-width="2"/>
    <text x="24" y="42" fill="#ff8fd4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="700">MADOKA.EXE</text>
    <text x="24" y="82" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">    /|\       CONTRACT: public</text>
    <text x="24" y="112" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">   /_|_\      WISH: more green</text>
    <text x="24" y="142" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">  ( '_' )     MAGIC: refresh</text>
    <text x="24" y="172" fill="#f2f5ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">  /|___|\     BADGE: no fake claims</text>
    <text x="24" y="218" fill="#ffd0ec" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">pink terminal, serious stats</text>
  </g>

  <g transform="translate(58 532)">
    <rect width="1184" height="182" fill="#090b10" stroke="#2a3342"/>
    <text x="28" y="44" fill="#7cff9b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24">juliosuas@wired:~$ cat profile.txt</text>
    <text x="28" y="82" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">operator   : Julio Suastegui</text>
    <text x="28" y="116" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">github     : github.com/juliosuas</text>
    <text x="28" y="150" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">brag style : terminal ascii, public receipts</text>
    <text x="840" y="82" fill="#ff6b6b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">[x] commits</text>
    <text x="840" y="116" fill="#75d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">[x] upstream PRs</text>
    <text x="840" y="150" fill="#ff8fd4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">[x] repo previews</text>
  </g>

  <text x="58" y="754" fill="#8d98ac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">present day / present time / github profile as public control surface</text>

  <defs>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#151923" stroke-opacity="0.8" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
