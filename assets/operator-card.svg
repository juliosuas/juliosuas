<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Julio Suastegui wired operator profile card</title>
  <desc id="desc">A dark terminal-style GitHub profile banner with ASCII waifu panels and public commit feed.</desc>
  <rect width="1280" height="760" fill="#0b0d12"/>
  <path d="M0 0H1280V760H0V0Z" fill="url(#scan)"/>
  <rect x="40" y="32" width="1200" height="296" fill="#090b10" stroke="#272c38" stroke-width="2"/>
  <text x="78" y="78" fill="#c9cbd3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="26">&gt; boot eva/profile --pilot=juliosuas</text>
  <text x="78" y="116" fill="#c9cbd3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="26">&gt; scan public_activity --mode=brag</text>
  <text x="78" y="154" fill="#f5f5f5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="25">        /\_/\          [ COMMIT FEED ]</text>
  <text x="78" y="188" fill="#f5f5f5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="25">       ( o.o )         push   -&gt; rocio</text>
  <text x="78" y="222" fill="#f5f5f5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="25">        &gt; ^ &lt;         merge  -&gt; mission-control</text>
  <text x="78" y="256" fill="#f5f5f5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="25">                      review -&gt; agents-office</text>
  <text x="78" y="300" fill="#c9cbd3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="25">status: shipping while the dashboard screams</text>

  <g transform="translate(40 372)">
    <rect width="360" height="150" fill="#151821" stroke="#343947"/>
    <text x="28" y="45" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">ASUKA.SYS</text>
    <text x="28" y="82" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">/| redline |\</text>
    <text x="28" y="112" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">/_| loud ops |_\</text>
  </g>

  <g transform="translate(440 372)">
    <rect width="360" height="150" fill="#151821" stroke="#343947"/>
    <text x="28" y="45" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">AKARI.LOG</text>
    <text x="28" y="82" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">( uptime )</text>
    <text x="28" y="112" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">[ soft chaos ]</text>
  </g>

  <g transform="translate(840 372)">
    <rect width="360" height="150" fill="#151821" stroke="#343947"/>
    <text x="28" y="45" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">MADONA.EXE</text>
    <text x="28" y="82" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">&lt; public glam &gt;</text>
    <text x="28" y="112" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">[ commit glow ]</text>
  </g>

  <g transform="translate(40 562)">
    <rect width="270" height="96" fill="#12151d" stroke="#303543"/>
    <text x="28" y="42" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30" font-weight="700">LIVE</text>
    <text x="28" y="72" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">ACTIONS RECEIPTS</text>
  </g>
  <g transform="translate(340 562)">
    <rect width="270" height="96" fill="#12151d" stroke="#303543"/>
    <text x="28" y="42" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30" font-weight="700">PRS</text>
    <text x="28" y="72" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">MERGED / SHIPPED</text>
  </g>
  <g transform="translate(640 562)">
    <rect width="270" height="96" fill="#12151d" stroke="#303543"/>
    <text x="28" y="42" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30" font-weight="700">COMMITS</text>
    <text x="28" y="72" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">PUBLIC GRAPH</text>
  </g>
  <g transform="translate(940 562)">
    <rect width="260" height="96" fill="#12151d" stroke="#303543"/>
    <text x="28" y="42" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30" font-weight="700">AGENTS</text>
    <text x="28" y="72" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">LUDWIG / JEFFREY</text>
  </g>

  <rect x="40" y="692" width="1200" height="1" fill="#303543"/>
  <text x="40" y="725" fill="#aeb2bf" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">best for: aggressive hacker flex, but backed by public GitHub receipts</text>

  <defs>
    <pattern id="scan" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#171b24" stroke-opacity="0.45" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
