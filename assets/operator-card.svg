<svg width="1280" height="1160" viewBox="0 0 1280 1160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Julio Suastegui GitHub biography terminal</title>
  <desc id="desc">One terminal biography with ASCII portraits for Asuka, Akari and Madoka plus GitHub, technology stack and operator work details.</desc>
  <rect width="1280" height="1160" fill="#07080c"/>
  <rect width="1280" height="1160" fill="url(#grid)" opacity="0.85"/>

  <rect x="30" y="28" width="1220" height="1104" rx="10" fill="#0b0d12" stroke="#273142" stroke-width="2"/>
  <rect x="30" y="28" width="1220" height="48" rx="10" fill="#171b24"/>
  <circle cx="58" cy="52" r="7" fill="#ff5f57"/>
  <circle cx="82" cy="52" r="7" fill="#ffbd2e"/>
  <circle cx="106" cy="52" r="7" fill="#28c840"/>
  <text x="132" y="59" fill="#d7deec" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">juliosuas@github:~/profile-bio - one terminal</text>

  <text x="58" y="112" fill="#7cff9b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">&gt; ./open-profile --user juliosuas --theme terminal-waifu-receipts</text>
  <text x="58" y="148" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">&gt; mount github public_stats tech_stack projects upstream_prs</text>
  <text x="58" y="184" fill="#ff6b6b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">&gt; rule: every flex needs public proof; never print raw secrets</text>

  <text x="58" y="238" fill="#8d98ac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">┌─ waifu_ascii.buffer ───────────────────────────────────────────────────────────────────────────────┐</text>

  <g transform="translate(74 270)">
    <text x="0" y="0" fill="#ff6b6b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700">ASUKA.LANGLEY.SYS</text>
    <text x="0" y="34" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">      //==\\        red plugsuit / redline mode</text>
    <text x="0" y="62" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">    .-      -.      pilot signal: upstream fixes</text>
    <text x="0" y="90" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">   /  o  o   \     command: ship under pressure</text>
    <text x="0" y="118" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">  |     ^     |    proof: commits, PRs, reviews</text>
    <text x="0" y="146" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">   \  \___/  /     motto: no empty flex</text>
    <text x="0" y="174" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">    /|[02]|\       github: github.com/juliosuas</text>
  </g>

  <g transform="translate(74 512)">
    <text x="0" y="0" fill="#75d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700">AKARI.AKAZA.LOG</text>
    <text x="0" y="34" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">     (@)  (@)      yuru signal: friendly chaos</text>
    <text x="0" y="62" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">    /  .--.  \     public graph: always visible</text>
    <text x="0" y="90" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">   |  (o  o)  |    work: OSINT, agents, dashboards</text>
    <text x="0" y="118" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">   |    __    |    habit: build tools that help</text>
    <text x="0" y="146" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">    \  '--'  /     vibe: weird, useful, shipped</text>
    <text x="0" y="174" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">      /||\         profile: soft chaos, hard receipts</text>
  </g>

  <g transform="translate(74 754)">
    <text x="0" y="0" fill="#ff8fd4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="700">MADOKA.KANAME.EXE</text>
    <text x="0" y="34" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">     \  ^  /       bow signal: bright terminal magic</text>
    <text x="0" y="62" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">    --\_|_/--      contract: turn ideas into repos</text>
    <text x="0" y="90" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">     ( o_o )       wish: more green squares</text>
    <text x="0" y="118" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">     /|_+_|\       output: products, automations, fixes</text>
    <text x="0" y="146" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">      /   \        badge: no fake claims</text>
    <text x="0" y="174" fill="#f3f5fb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">    _/_____\_      status: README deployed</text>
  </g>

  <text x="58" y="1088" fill="#8d98ac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">└─────────────────────────────────────────────────────────────────────────────────────────────────────┘</text>

  <g transform="translate(720 270)">
    <text x="0" y="0" fill="#7cff9b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">juliosuas@github:~$ cat bio.md</text>
    <text x="0" y="42" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">name       : Julio Cesar Suastegui</text>
    <text x="0" y="74" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">handle     : juliosuas</text>
    <text x="0" y="106" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">role       : cybersecurity / OSINT / agents</text>
    <text x="0" y="138" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">mode       : build tools, ship receipts</text>
    <text x="0" y="170" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">location   : Mexico City, MX</text>
    <text x="0" y="202" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">website    : juliosuastegui.com</text>

    <text x="0" y="270" fill="#7cff9b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">juliosuas@github:~$ tech --stack</text>
    <text x="0" y="312" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">python       typescript    javascript</text>
    <text x="0" y="344" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">react        node.js       github actions</text>
    <text x="0" y="376" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">supabase     tailscale     obsidian</text>
    <text x="0" y="408" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">openclaw     gbrain        mission control</text>

    <text x="0" y="476" fill="#7cff9b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">juliosuas@github:~$ ls work/</text>
    <text x="0" y="518" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">ghost/       OSINT + username intelligence</text>
    <text x="0" y="550" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">rocio/       flower workflow + visual product</text>
    <text x="0" y="582" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">ai-garden/   autonomous agent experiment</text>
    <text x="0" y="614" fill="#dfe6f3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">upstream/    sentry, responses, mitmproxy</text>

    <text x="0" y="650" fill="#7cff9b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">juliosuas@github:~$ grep receipts</text>
    <text x="0" y="692" fill="#ff6b6b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">[x] commits</text>
    <text x="0" y="724" fill="#75d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">[x] merged pull requests</text>
    <text x="0" y="756" fill="#ff8fd4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">[x] repo screenshots</text>
  </g>

  <defs>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#161b25" stroke-opacity="0.7" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
